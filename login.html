<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Veneto</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container-all-grid-login">

        <header>
            <div class="logo"><a href="home.html"><img src="venetofitness-logo.png" alt=""></a></div>
        </header>

        <div class="cotainer-all-center">

            <div class="container-texto-login">
                <h1>Fazer login</h1>
                <p>Fazer login ou criar uma conta</p>
            </div>

            <div class="container-buttons-login">
                <div class="button-apple">
                    <a href="home.html"><img src="logotipo-da-apple.png" alt=""><span>Continuar com Apple</span></a>
                </div>
                <div class="button-google-login">
                    <a href="home.html"><img src="google-icon.png   " alt=""><span>Continuar com Google</span></a>
                </div>

                <div class="container-linhas-OU-login">
                    <span>ou</span>
                </div>
            </div>

            <div class="input-email-plus-checkbox-login">
                <div class="container-botao-email">
                    <div class="container-email-input"><input type="email" placeholder="E-mail"></div>
                
                    <div><button class="botao-seta"><img src="" alt=""></button></div>
                </div>

                <div class="checkbox-login">
                    <label>
                        <input type="checkbox" name="anuncio-email" value="anuncio-email">
                        Enviar novidades e ofertas para mim por e-mail
                    </label>
                </div>

            </div>

        </div>

        <footer>
            <div class="container-texto-footer-login">
                <a href="home.html">Políticas de Privacidade</a>
            </div>
        </footer>

    </div>
</body>
</html>
